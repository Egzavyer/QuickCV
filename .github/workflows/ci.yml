name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tools
        run: pip install ruff mypy pytest

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy models/decision.py models/geometry.py

      - name: Run tests
        run: pytest
